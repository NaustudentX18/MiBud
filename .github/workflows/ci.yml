name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install platform-compatible dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only packages that work outside Raspberry Pi
          pip install \
            aiohttp \
            flask \
            python-dotenv \
            openai \
            anthropic \
            google-generativeai \
            ollama \
            faster-whisper \
            vosk \
            pyaudio \
            numpy \
            scipy \
            Pillow \
            requests \
            zeroconf \
            python-dateutil \
            psutil \
            pytest \
            ruff || true

      - name: Lint with ruff
        run: ruff check . || true

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
