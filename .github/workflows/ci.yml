name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install platform-compatible dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only packages that work outside Raspberry Pi.
          # Pi-specific / source-build packages excluded from CI:
          #   pyaudio        — requires portaudio19-dev (no linux wheel)
          #   RPi.GPIO, spidev, picamera2, pyalsaaudio, piper-tts — Pi-only
          # Tests don't import any of these at collection or run time.
          pip install \
            aiohttp \
            flask \
            python-dotenv \
            openai \
            anthropic \
            google-generativeai \
            ollama \
            faster-whisper \
            vosk \
            numpy \
            scipy \
            Pillow \
            requests \
            zeroconf \
            python-dateutil \
            psutil \
            pytest \
            pytest-asyncio \
            ruff

      - name: Lint with ruff
        # Pre-existing lint warnings are present in the codebase.
        # Lint is run for visibility but does not block CI until cleaned up.
        run: ruff check . || true

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
