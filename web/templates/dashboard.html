<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiBud Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #1a1a2e;
            --fg: #e0e0e0;
            --accent: #00ff64;
            --secondary: #0096ff;
            --error: #ff4757;
            --surface: rgba(255,255,255,0.05);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
        }
        
        .header {
            background: var(--surface);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
        }
        
        .card-title {
            font-size: 0.9em;
            color: var(--accent);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Chat Area */
        .chat-area {
            display: flex;
            flex-direction: column;
            min-height: 500px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 10px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
        }
        
        .message.user {
            background: var(--secondary);
            color: white;
            margin-left: auto;
        }
        
        .message.mibud {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .message-time {
            font-size: 0.75em;
            color: #666;
            margin-top: 5px;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: var(--fg);
            font-size: 1em;
        }
        
        .input-area button {
            padding: 12px 24px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .personality-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .personality-btn {
            background: var(--surface);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .personality-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .personality-btn.active {
            border-color: var(--accent);
        }
        
        .personality-btn .emoji {
            font-size: 1.5em;
        }
        
        .personality-btn .name {
            font-size: 0.7em;
            margin-top: 3px;
        }
        
        .quick-actions {
            display: grid;
            gap: 8px;
        }
        
        .quick-btn {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            color: var(--fg);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        
        .quick-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
        }
        
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .toggle {
            width: 50px;
            height: 26px;
            background: #333;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .toggle.active {
            background: var(--accent);
        }
        
        .toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }
        
        .toggle.active::after {
            left: 26px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🤖 MiBud</div>
        <div class="status-bar">
            <div class="status-item">🔋 <span id="battery">85%</span></div>
            <div class="status-item">📶 <span id="wifi">Excellent</span></div>
            <div class="status-item">🟢 <span id="status">Online</span></div>
        </div>
    </header>
    
    <main class="main">
        <div class="chat-area card">
            <div class="card-title">💬 Conversation</div>
            
            <div class="messages" id="messages">
                <div class="message mibud">
                    <div>👋 Hi! I'm MiBud, your AI companion. How can I help you today?</div>
                    <div class="message-time">Just now</div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        
        <aside class="sidebar">
            <div class="card">
                <div class="card-title">👤 Personality</div>
                <div class="personality-selector" id="personalitySelector">
                    <!-- Populated by JS -->
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">⚡ Quick Actions</div>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickAction('weather')">🌤  Weather</button>
                    <button class="quick-btn" onclick="quickAction('time')">⏰  Time</button>
                    <button class="quick-btn" onclick="quickAction('joke')">😄  Tell me a joke</button>
                    <button class="quick-btn" onclick="quickAction('fact')">💡  Random fact</button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">⚙️ Settings</div>
                <div class="settings-list">
                    <div class="setting-item">
                        <span>🌐 Online Mode</span>
                        <div class="toggle active" id="onlineToggle" onclick="toggleSetting('online')"></div>
                    </div>
                    <div class="setting-item">
                        <span>🔊 TTS</span>
                        <div class="toggle active" id="ttsToggle" onclick="toggleSetting('tts')"></div>
                    </div>
                    <div class="setting-item">
                        <span>🎤 Wake Word</span>
                        <div class="toggle active" id="wakeWordToggle" onclick="toggleSetting('wakeword')"></div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">📊 System</div>
                <div style="font-size:0.85em;color:#888;">
                    <p>Version: <span id="version">0.1.0</span></p>
                    <p>Uptime: <span id="uptime">0h 0m</span></p>
                    <p>Memory: <span id="memory">45%</span></p>
                </div>
            </div>
        </aside>
    </main>

    <script>
        let currentPersonality = 'assistant';
        let personalities = [];
        
        // Load personalities
        async function loadPersonalities() {
            try {
                const response = await fetch('/api/personality/list');
                personalities = await response.json();
                
                const selector = document.getElementById('personalitySelector');
                selector.innerHTML = personalities.slice(0, 9).map(p => `
                    <div class="personality-btn ${p.id === currentPersonality ? 'active' : ''}" 
                         onclick="changePersonality('${p.id}')">
                        <div class="emoji">${p.emoji}</div>
                        <div class="name">${p.name}</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load personalities:', e);
            }
        }
        
        function changePersonality(id) {
            currentPersonality = id;
            document.querySelectorAll('.personality-btn').forEach(btn => {
                btn.classList.toggle('active', btn.querySelector('.name').textContent.toLowerCase() === id);
            });
            
            // Save personality
            fetch('/api/personality/set', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({personality: id})
            });
            
            addMessage('system', `Personality changed to ${id}`);
        }
        
        function addMessage(type, text) {
            const messages = document.getElementById('messages');
            const time = new Date().toLocaleTimeString();
            
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.innerHTML = `
                <div>${text}</div>
                <div class="message-time">${time}</div>
            `;
            
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            addMessage('user', text);
            input.value = '';
            
            // Simulate response (actual AI would be called here)
            setTimeout(() => {
                addMessage('mibud', 'This is a demo response. Connect to an AI provider for real responses!');
            }, 1000);
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function quickAction(action) {
            const actions = {
                'weather': 'What\'s the weather like today?',
                'time': 'What time is it?',
                'joke': 'Tell me a joke',
                'fact': 'Tell me an interesting fact'
            };
            
            document.getElementById('messageInput').value = actions[action] || '';
            sendMessage();
        }
        
        function toggleSetting(setting) {
            const toggle = document.getElementById(setting + 'Toggle');
            toggle.classList.toggle('active');
        }
        
        // Load status
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();
                
                document.getElementById('battery').textContent = status.battery + '%';
                document.getElementById('version').textContent = status.version;
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }
        
        // Initialize
        loadPersonalities();
        loadStatus();
        
        // Update time
        setInterval(() => {
            document.getElementById('uptime').textContent = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
